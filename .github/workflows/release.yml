name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux-x86_64
            artifact: nymble-relay
          - os: macos-13
            name: macos-x86_64
            artifact: nymble-relay
          - os: macos-14
            name: macos-arm64
            artifact: nymble-relay
          - os: windows-latest
            name: windows-x86_64
            artifact: nymble-relay.exe

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary
        run: pyinstaller nymble-relay.spec --noconfirm

      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p release
          cp "dist/${{ matrix.artifact }}" "release/nymble-relay-${{ matrix.name }}${{ runner.os == 'Windows' && '.exe' || '' }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nymble-relay-${{ matrix.name }}
          path: release/nymble-relay-*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Publish Release

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum nymble-relay-* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/nymble-relay-*
            artifacts/SHA256SUMS.txt
